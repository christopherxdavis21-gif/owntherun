<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Catch Up</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #c6f700;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .wrap { padding: 2rem; max-width: 22rem; }
      h1 { font-size: 1.75rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
      p { color: #888; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        background: #c6f700;
        color: #0a0a0a;
        border: 0;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        font-weight: 600;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Catch Up</h1>
      <p>You appear to be offline. Connect to the internet and reopen the app to keep tracking.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
